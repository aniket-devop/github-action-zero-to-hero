<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps UI</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  font-family: Arial, sans-serif;
  background: url("https://images.unsplash.com/photo-1517336714731-489689fd1ca8") no-repeat center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* dark overlay */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(20,20,40,0.9));
  z-index: 0;
}

/* glass card */
.card {
  position: relative;
  z-index: 1;
  width: 350px;
  padding: 30px;
  border-radius: 15px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  color: white;
  text-align: center;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

p {
  color: #ccc;
  margin-bottom: 20px;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #7c3aed;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #5b21b6;
}
</style>
</head>

<body>

<div class="card">
  <h1>🚀 DevOps App</h1>
  <p>CI/CD Pipeline Running Successfully</p>
  <button>Deploy Now</button>
</div>

</body>
</html>
