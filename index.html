<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Insider</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #312e81);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.container {
    text-align: center;
}

/* Title */
h1 {
    font-size: 48px;
    background: linear-gradient(to right, #38bdf8, #6366f1);
    -webkit-background-clip: text;
    color: transparent;
}

/* Badge */
.badge {
    display: inline-block;
    margin-top: 15px;
    padding: 8px 18px;
    border: 1px solid #6366f1;
    border-radius: 25px;
    font-size: 14px;
    color: #c4b5fd;
}

/* Subtitle */
.subtitle {
    margin-top: 10px;
    color: #9ca3af;
    font-size: 14px;
}

/* Cards */
.cards {
    display: flex;
    gap: 20px;
    margin-top: 40px;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 15px;
    width: 180px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* Small title */
.card h4 {
    font-size: 12px;
    color: #9ca3af;
    letter-spacing: 1px;
}

/* Main text */
.card p {
    font-size: 18px;
    margin-top: 10px;
    font-weight: bold;
}

/* CI/CD special card */
.full {
    width: 200px;
}
</style>
</head>

<body>

<div class="container">

    <h1>DevOps Insider 🚀</h1>

    <div class="badge">Josh Batch 10 (USA Edition v2)v>

    <div class="subtitle">
        Built • Tested • Linted • Deployed via GitHub Actions
    </div>

    <div class="cards">

        <div class="card">
            <h4>FRAMEWORK</h4>
            <p>Flask 3.1</p>
        </div>

        <div class="card">
            <h4>RUNTIME</h4>
            <p>Python 3.14</p>
        </div>

        <div class="card">
            <h4>DEPLOY</h4>
            <p>AWS EC2</p>
        </div>

        <div class="card full">
            <h4>CI/CD</h4>
            <p>GitHub Actions</p>
        </div>

    </div>

</div>

</body>
</html>
