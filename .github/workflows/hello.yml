name: hello aniket

on:
  push:
    branches:
      - main
    paths:
      - "index.html"

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: say hello to user
        run: echo "hello to user"

      - name: say hello to username
        run: echo "hello $USER"

      - name: version of python, docker
        run: docker --version && python --version
