name: Deploy to Server

on:
  workflow_call:
    secrets:
      SSH_KEY:
        required: true
      HOST:
        required: true
      USERNAME:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "🚀 Deploy Start"

            cd /home/ubuntu

            if [ ! -d "github-action-zero-to-hero" ]; then
              git clone https://github.com/${{ github.repository }} github-action-zero-to-hero
            fi

            cd github-action-zero-to-hero

            git pull origin main

            docker-compose down || true
            docker-compose up -d --build

            echo "✅ Done"