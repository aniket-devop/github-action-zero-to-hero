name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Decode SSH Key properly
      - name: Setup SSH Key
        run: |
          echo "${{ secrets.SSH_KEY_BASE64 }}" | base64 -d > key.pem
          chmod 600 key.pem

      # ✅ Deploy via SSH (FIXED)
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key_path: key.pem
          port: 22
          script: |
            echo "🚀 Starting Deployment..."

            # Go to home
            cd /home/ubuntu

            # Clone repo if not exists
            if [ ! -d "github-action-zero-to-hero" ]; then
              git clone https://github.com/${{ github.repository }} github-action-zero-to-hero
            fi

            # Go inside repo
            cd github-action-zero-to-hero

            # Pull latest code
            git pull origin main

            # Run container
            docker-compose down || true
            docker-compose up -d --build

            echo "✅ Deployment Done!"