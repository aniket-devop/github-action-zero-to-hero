name: Deploy to Server

on:
  workflow_call:
    secrets:
      SSH_KEY_BASE64:
        required: true
      HOST:
        required: true
      USERNAME:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ FIXED: SSH Key decode + permission
      - name: Setup SSH Key
        run: |
          echo "${{ secrets.SSH_KEY_BASE64 }}" | base64 -d > key.pem
          chmod 600 key.pem

      # ✅ Deploy via SSH
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key_path: key.pem
          port: 22
          script: |
            echo "🚀 Deployment Started"

            cd /home/ubuntu

            if [ ! -d "github-action-zero-to-hero" ]; then
              git clone https://github.com/${{ github.repository }} github-action-zero-to-hero
            fi

            cd github-action-zero-to-hero

            git pull origin main

            docker-compose down || true
            docker-compose up -d --build

            echo "✅ Deployment Finished"