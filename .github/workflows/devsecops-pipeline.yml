name: DevSecOps End To End Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

# 🔹 1. Code Quality
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Code
        run: |
          echo "Running Lint..."
          pip install flake8
          flake8 . || true

# 🔹 2. Dependency Scan
  dependency-scan:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      - name: Install Safety
        run: pip install safety
      - name: Run Dependency Scan
        run: safety check || true

# 🔹 3. Docker Lint
  docker-lint:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      - name: Dockerfile Lint
        run: |
          docker run --rm -i hadolint/hadolint < Dockerfile || true

# 🔹 4. Build & Push Docker Image
  build-push:
    runs-on: ubuntu-latest
    needs: [dependency-scan, docker-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

# 🔹 5. Image Scan (Trivy)
  image-scan:
    runs-on: ubuntu-latest
    needs: build-push
    steps:
      - name: Scan Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest'
          format: 'table'
          exit-code: '0'

# 🔹 6. Deploy to EC2
  deploy:
    runs-on: ubuntu-latest
    needs: image-scan
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "🚀 Deployment Start"

            cd /home/ubuntu

            if [ ! -d "app" ]; then
              git clone https://github.com/${{ github.repository }} app
            fi

            cd app

            git pull origin main

            docker stop app || true
            docker rm app || true

            docker pull ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

            docker run -d -p 80:80 --name app ${{ secrets.DOCKER_USERNAME }}/devsecops-app:latest

            echo "✅ Deployment Done"