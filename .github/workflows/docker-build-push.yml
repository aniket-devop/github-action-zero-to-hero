name: Docker Build & Push

on:
  workflow_call:   # 👈 FIX (mandatory for reusable)
  workflow_dispatch:  # 👈 optional (manual run ke liye)

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug files
        run: ls -la

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERS }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERS }}/github-actions-app:${{ github.ref_name }}
            ${{ vars.DOCKERHUB_USERS }}/github-actions-app:latest
            ${{ vars.DOCKERHUB_USERS }}/github-actions-app:${{ github.sha }}