name: Docker Build & Push

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 📥 Code checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔐 Docker Hub login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: aniket484
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🐳 Build & Push image
      - name: Build & Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            aniket484/github-actions-app:latest
            aniket484/github-actions-app:${{ github.sha }}