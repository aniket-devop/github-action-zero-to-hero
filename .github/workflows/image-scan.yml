# uses Trivy image scanner for CVEs
name: Image Scanner

on:
  workflow_call:

jobs:
  image-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.DOCKERHUB_USER }}/github-actions-app:latest
          format: table
          exit-code: 1
          ignore-unfixed: true
          severity: CRITICAL,HIGH