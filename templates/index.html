<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevOps Pipeline</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      border-radius: 15px;
      padding: 30px;
      width: 350px;
      text-align: center;
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.3);
      border: 1px solid #334155;
      animation: fadeIn 1s ease-in-out;
    }

    .logo {
      width: 80px;
      margin-bottom: 15px;
    }

    h1 {
      color: #38bdf8;
      font-size: 24px;
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      margin: 8px 0;
    }

    .status {
      font-size: 18px;
      margin-top: 10px;
    }

    .footer {
      margin-top: 15px;
      font-size: 14px;
      color: #94a3b8;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="box">

    <!-- Logo -->
    <img class="logo" src="https://cdn-icons-png.flaticon.com/512/919/919853.png" alt="DevOps Logo">

    <h1>🚀 DevOps Pipeline Success</h1>

    <p class="status">
      🔧 Build ✅ <br>
      🧪 Test ✅ <br>
      🔍 Lint ✅ <br>
      🚀 Deploy ✅
    </p>

    <p>⚡ Deployed via <strong>GitHub Actions</strong></p>

    <div class="footer">
      💻 Made with ❤️ by DevOps Engineer
    </div>

  </div>

</body>
</html>
