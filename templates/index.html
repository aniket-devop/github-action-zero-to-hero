<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Pipeline | Aniket Kumar</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e1b4b);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(99,102,241,0.4);
    width: 520px;
}

/* Logo */
.logo {
    width: 120px;
    margin-bottom: 10px;
}

/* Title */
h1 {
    color: #6366f1;
}

/* Pipeline */
.pipeline {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
}

/* Step */
.step {
    text-align: center;
    flex: 1;
    position: relative;
}

/* Circle */
.circle {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #1e293b;
    line-height: 50px;
    margin: auto;
    border: 2px solid #6366f1;
}

/* Done */
.done .circle {
    background: #22c55e;
    border: none;
}

/* Line */
.step::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 3px;
    background: #334155;
    top: 25px;
    left: 50%;
    z-index: -1;
}

.step:last-child::after {
    display: none;
}

/* Text */
.label {
    margin-top: 10px;
    font-size: 14px;
}

/* Button */
button {
    margin-top: 30px;
    padding: 10px 20px;
    background: #6366f1;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
}

</style>
</head>

<body>

<div class="container">

    <!-- 🔥 DevOps Insider Logo -->
    <img class="logo" src="https://devopsinsider.io/wp-content/uploads/2023/05/DevOps-Insider-Logo.png" alt="DevOps Insider Logo">

    <h1>🚀 CI/CD Pipeline</h1>

    <div class="pipeline">
        <div class="step done">
            <div class="circle">✔</div>
            <div class="label">Code</div>
        </div>

        <div class="step done">
            <div class="circle">✔</div>
            <div class="label">Build</div>
        </div>

        <div class="step done">
            <div class="circle">✔</div>
            <div class="label">Test</div>
        </div>

        <div class="step done">
            <div class="circle">✔</div>
            <div class="label">Deploy</div>
        </div>
    </div>

    <p style="margin-top:20px;">Pipeline Completed Successfully ✅</p>

    <button onclick="location.reload()">Run Again</button>

    <p style="margin-top:20px; font-size:12px;">By Aniket Kumar</p>
</div>

</body>
</html>
