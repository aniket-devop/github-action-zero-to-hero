<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Zero To Hero</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: white;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #22c1c3, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            margin-bottom: 25px;
            font-size: 14px;
            opacity: 0.8;
        }

        .cards {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            width: 150px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .card h3 {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        .card p {
            font-size: 18px;
            font-weight: bold;
        }

        .bottom-card {
            margin-top: 15px;
            display: inline-block;
            padding: 15px 30px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
        }

    </style>
</head>

<body>

    <div class="container">
        <h1>DevOps Zero To Hero</h1>

        <div class="subtitle">
            Built • Tested • Deployed via GitHub Actions
        </div>

        <div class="cards">
            <div class="card">
                <h3>Framework</h3>
                <p>Flask</p>
            </div>

            <div class="card">
                <h3>Runtime</h3>
                <p>Python 3.9</p>
            </div>

            <div class="card">
                <h3>Deploy</h3>
                <p>AWS EC2</p>
            </div>
        </div>

        <div class="bottom-card">
            CI/CD → GitHub Actions 🚀
        </div>
    </div>

</body>
</html>
