<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Zero To Hero</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: Arial, sans-serif;
            color: #fff;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .badge {
            margin-bottom: 20px;
            font-size: 1rem;
            color: #ccc;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>DevOps Zero To Hero</h1>
        <div class="badge">Josh Batch 10</div>

        <div class="card">Framework: Flask</div>
        <div class="card">Runtime: Python</div>
        <div class="card">Deploy: AWS EC2</div>
    </div>
</body>
</html>
